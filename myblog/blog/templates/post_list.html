<!-- blog/templates/blog/post_list.html -->
{% extends 'base.html' %}

{% block content %}

<h3>Blog Posts</h3>

{% for post in posts %}
    <article>
        <h2>{{ post.title }}</h2>
        <p>By {{ post.author }} | {{ post.created_at }}</p>
        <p>{{ post.content|truncatewords:20 }}</p>
        <hr>
    </article>
{% empty %}
    <p>No posts available.</p>
{% endfor %}

{% endblock %}
